# Build Vite app and publish to GitHub Pages (needs repo secrets — see README).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Needed so secrets stored on the "github-pages" Environment are visible to this job.
    # Repository-level Action secrets are always available; Environment-only secrets are not.
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Verify VITE_INVITE_CODES_JSON is set
        env:
          INVITE: ${{ secrets.VITE_INVITE_CODES_JSON }}
        run: |
          if [ -z "$INVITE" ]; then
            echo "::error::VITE_INVITE_CODES_JSON is empty. Add it under Settings → Secrets and variables → Actions."
            echo "Use either Repository secrets (recommended) or Environment secrets on github-pages (this build job uses that environment)."
            exit 1
          fi
      - name: Verify VITE_INVITE_CODES_JSON is valid JSON
        env:
          INVITE: ${{ secrets.VITE_INVITE_CODES_JSON }}
        run: node -e "JSON.parse(process.env.INVITE)"

      - run: npm ci
      - run: npm run build
        env:
          VITE_GOOGLE_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_SCRIPT_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_INVITE_CODES_JSON: ${{ secrets.VITE_INVITE_CODES_JSON }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
